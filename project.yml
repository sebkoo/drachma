# The Xcode app shell, declaratively. Regenerate with: xcodegen generate
# The shell stays thin on purpose — the package owns the app (DrachmaRootView
# is the composition root); this target is just @main plus signing plumbing.
name: Drachma
options:
  bundleIdPrefix: dev.sebkoo
  deploymentTarget:
    iOS: "17.0"
packages:
  DrachmaPackage:
    path: .
targets:
  Drachma:
    type: application
    platform: iOS
    sources:
      - ios/Shell
    dependencies:
      - package: DrachmaPackage
        product: DrachmaApp
      - target: DrachmaWidgets
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: dev.sebkoo.drachma
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
  DrachmaWidgets:
    type: app-extension
    platform: iOS
    sources:
      - ios/Widgets
    dependencies:
      - package: DrachmaPackage
        product: DrachmaCore
    info:
      path: ios/Widgets/Info.plist
      properties:
        CFBundleDisplayName: Drachma Rate
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sebkoo.drachma.widgets
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: "6.0"
        SKIP_INSTALL: YES
