# The Xcode app shell, declaratively. Regenerate with: xcodegen generate
# The shell stays thin on purpose — the package owns the app (DrachmaRootView
# is the composition root); this target is just @main plus signing plumbing.
name: Drachma
options:
  bundleIdPrefix: dev.sebkoo
  deploymentTarget:
    iOS: "17.0"
packages:
  DrachmaPackage:
    path: .
targets:
  Drachma:
    type: application
    platform: iOS
    sources:
      - ios/Shell
    dependencies:
      - package: DrachmaPackage
        product: DrachmaApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.sebkoo.drachma
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
