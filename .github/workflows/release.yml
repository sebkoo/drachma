name: Release

# Tag-driven release automation: a version tag builds the drachma-mcp binary
# and publishes it as a versioned artifact on a GitHub Release — the same job
# an artifact repository + deploy tool does in an enterprise pipeline, here
# with GitHub Actions.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --product drachma-mcp

      - name: Package artifact
        run: |
          tarball="drachma-mcp-${GITHUB_REF_NAME}-macos-arm64.tar.gz"
          tar -czf "$tarball" -C .build/release drachma-mcp
          shasum -a 256 "$tarball" > "$tarball.sha256"
          echo "TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$TARBALL" "$TARBALL.sha256" \
            --title "$GITHUB_REF_NAME" \
            --notes "drachma-mcp $GITHUB_REF_NAME — keyless ECB rates over MCP (convert, latest_rates, historical_rates). macOS arm64 binary attached with its SHA-256. See the README to add it to Claude Code."
